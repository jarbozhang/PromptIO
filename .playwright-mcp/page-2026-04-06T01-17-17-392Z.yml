          - heading "Looking ahead" [level=2] [ref=e183]
          - paragraph [ref=e185]: Safe interaction with the adversarial outside world is necessary for fully autonomous agents. When integrating an AI model with an application system, we recommend asking what controls a human agent should have in a similar situation and implementing those. We expect that a maximally intelligent AI model will be able to resist social engineering better than a human agent, but this is not always feasible or cost-effective depending on the application.
          - paragraph [ref=e187]: We continue to explore the implications of social engineering against AI models and defenses against it and incorporate our findings both into our application security architectures and the training we put our AI models through.
