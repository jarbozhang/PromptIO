              - paragraph [ref=e74]: "The artificial intelligence coding revolution comes with a catch: it's expensive."
              - paragraph [ref=e75]:
                - link "Claude Code" [ref=e76] [cursor=pointer]:
                  - /url: https://claude.com/product/claude-code
                - text: ", Anthropic's terminal-based AI agent that can write, debug, and deploy code autonomously, has captured the imagination of software developers worldwide. But its"
                - link "pricing" [ref=e77] [cursor=pointer]:
                  - /url: https://claude.com/pricing
                - text: — ranging from $20 to $200 per month depending on usage — has sparked a growing rebellion among the very programmers it aims to serve.
              - paragraph [ref=e78]:
                - text: Now, a free alternative is gaining traction.
                - link "Goose" [ref=e79] [cursor=pointer]:
                  - /url: https://block.github.io/goose/
                - text: ", an open-source AI agent developed by"
                - link "Block" [ref=e80] [cursor=pointer]:
                  - /url: https://block.xyz/
                - text: (the financial technology company formerly known as Square), offers nearly identical functionality to
                - link "Claude Code" [ref=e81] [cursor=pointer]:
                  - /url: https://claude.com/product/claude-code
                - text: but runs entirely on a user's local machine. No subscription fees. No cloud dependency. No rate limits that reset every five hours.
              - paragraph [ref=e83]:
                - text: "\"Your data stays with you, period,\" said Parth Sareen, a software engineer who demonstrated the tool during a"
                - link "recent livestream" [ref=e84] [cursor=pointer]:
                  - /url: https://www.youtube.com/watch?v=WG10r2N0IwM
                - text: ". The comment captures the core appeal: Goose gives developers complete control over their AI-powered workflow, including the ability to work offline — even on an airplane."
              - paragraph [ref=e85]:
                - text: The project has exploded in popularity. Goose now boasts more than
                - link "26,100 stars on GitHub" [ref=e86] [cursor=pointer]:
                  - /url: https://github.com/block/goose
                - text: ", the code-sharing platform, with 362 contributors and 102 releases since its launch. The latest version,"
                - link "1.20.1" [ref=e87] [cursor=pointer]:
                  - /url: https://block.github.io/goose/docs/getting-started/installation
                - text: ", shipped on January 19, 2026, reflecting a development pace that rivals commercial products."
              - paragraph [ref=e89]: "For developers frustrated by Claude Code's pricing structure and usage caps, Goose represents something increasingly rare in the AI industry: a genuinely free, no-strings-attached option for serious work."
              - iframe [ref=e90]:
