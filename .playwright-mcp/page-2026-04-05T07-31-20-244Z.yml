              - heading "Anthropic's new rate limits spark a developer revolt" [level=2] [ref=e91]
              - paragraph [ref=e92]:
                - text: To understand why
                - link "Goose" [ref=e93] [cursor=pointer]:
                  - /url: https://block.github.io/goose/
                - text: matters, you need to understand the
                - link "Claude Code pricing controversy" [ref=e94] [cursor=pointer]:
                  - /url: https://techcrunch.com/2025/07/17/anthropic-tightens-usage-limits-for-claude-code-without-telling-users/
                - text: .
              - paragraph [ref=e95]:
                - text: Anthropic, the San Francisco artificial intelligence company founded by former OpenAI executives, offers Claude Code as part of its subscription tiers. The free plan provides no access whatsoever. The
                - link "Pro plan" [ref=e96] [cursor=pointer]:
                  - /url: https://www.anthropic.com/news/claude-pro
                - text: ", at $17 per month with annual billing (or $20 monthly), limits users to just 10 to 40 prompts every five hours — a constraint that serious developers exhaust within minutes of intensive work."
              - paragraph [ref=e97]:
                - text: The
                - link "Max plans" [ref=e98] [cursor=pointer]:
                  - /url: https://support.claude.com/en/articles/11049741-what-is-the-max-plan
                - text: ", at $100 and $200 per month, offer more headroom: 50 to 200 prompts and 200 to 800 prompts respectively, plus access to Anthropic's most powerful model,"
                - link "Claude 4.5 Opus" [ref=e99] [cursor=pointer]:
                  - /url: https://www.anthropic.com/news/claude-opus-4-5
                - text: . But even these premium tiers come with restrictions that have inflamed the developer community.
              - paragraph [ref=e100]: In late July, Anthropic announced new weekly rate limits. Under the system, Pro users receive 40 to 80 hours of Sonnet 4 usage per week. Max users at the $200 tier get 240 to 480 hours of Sonnet 4, plus 24 to 40 hours of Opus 4. Nearly five months later, the frustration has not subsided.
              - paragraph [ref=e101]: The problem? Those "hours" are not actual hours. They represent token-based limits that vary wildly depending on codebase size, conversation length, and the complexity of the code being processed. Independent analysis suggests the actual per-session limits translate to roughly 44,000 tokens for Pro users and 220,000 tokens for the $200 Max plan.
              - paragraph [ref=e102]:
                - text: "\"It's confusing and vague,\" one developer wrote in a"
                - link "widely shared analysis" [ref=e103] [cursor=pointer]:
                  - /url: https://userjot.com/blog/claude-code-pricing-200-dollar-plan-worth-it
                - text: . "When they say '24-40 hours of Opus 4,' that doesn't really tell you anything useful about what you're actually getting."
              - paragraph [ref=e104]:
                - text: The
                - link "backlash on Reddit" [ref=e105] [cursor=pointer]:
                  - /url: https://www.reddit.com/r/Anthropic/comments/1mbo4uw/claude_code_max_new_weekly_rate_limits/
                - text: and
                - link "developer forums" [ref=e106] [cursor=pointer]:
                  - /url: https://venturebeat.com/ai/anthropic-throttles-claude-rate-limits-devs-call-foul
                - text: has been fierce. Some users report hitting their daily limits within 30 minutes of intensive coding. Others have canceled their subscriptions entirely, calling the new restrictions "a joke" and "unusable for real work."
              - paragraph [ref=e107]:
                - text: Anthropic has defended the changes, stating that the limits affect fewer than five percent of users and target people running Claude Code "
                - link "continuously in the background, 24/7" [ref=e108] [cursor=pointer]:
                  - /url: https://techcrunch.com/2025/07/28/anthropic-unveils-new-rate-limits-to-curb-claude-code-power-users/
                - text: ." But the company has not clarified whether that figure refers to five percent of Max subscribers or five percent of all users — a distinction that matters enormously.
              - heading "How Block built a free AI coding agent that works offline" [level=2] [ref=e109]
              - paragraph [ref=e110]:
                - link "Goose" [ref=e111] [cursor=pointer]:
                  - /url: https://block.github.io/goose/
                - text: takes a radically different approach to the same problem.
              - paragraph [ref=e112]:
                - text: Built by
                - link "Block" [ref=e113] [cursor=pointer]:
                  - /url: https://block.xyz/
                - text: ", the payments company led by Jack Dorsey, Goose is what engineers call an \""
                - link "on-machine AI agent" [ref=e114] [cursor=pointer]:
                  - /url: https://github.com/block/goose
                - text: ." Unlike Claude Code, which sends your queries to Anthropic's servers for processing, Goose can run entirely on your local computer using open-source language models that you download and control yourself.
              - paragraph [ref=e115]:
                - text: The project's documentation describes it as going "
                - link "beyond code suggestions" [ref=e116] [cursor=pointer]:
                  - /url: https://github.com/block/goose
                - text: "\" to \"install, execute, edit, and test with any LLM.\" That last phrase — \"any LLM\" — is the key differentiator. Goose is model-agnostic by design."
              - paragraph [ref=e117]:
                - text: You can connect Goose to Anthropic's
                - link "Claude models" [ref=e118] [cursor=pointer]:
                  - /url: https://platform.claude.com/docs/en/about-claude/models/overview
                - text: if you have
                - link "API access" [ref=e119] [cursor=pointer]:
                  - /url: https://claude.com/platform/api
                - text: . You can use OpenAI's
                - link "GPT-5" [ref=e120] [cursor=pointer]:
                  - /url: https://platform.openai.com/docs/models/gpt-5
                - text: or Google's
                - link "Gemini" [ref=e121] [cursor=pointer]:
                  - /url: https://ai.google.dev/gemini-api/docs
                - text: . You can route it through services like
                - link "Groq" [ref=e122] [cursor=pointer]:
                  - /url: https://groq.com/
                - text: or
                - link "OpenRouter" [ref=e123] [cursor=pointer]:
                  - /url: https://openrouter.ai/
                - text: . Or — and this is where things get interesting — you can run it entirely locally using tools like
                - link "Ollama" [ref=e124] [cursor=pointer]:
                  - /url: https://ollama.com/
                - text: ", which let you download and execute open-source models on your own hardware."
              - paragraph [ref=e125]: The practical implications are significant. With a local setup, there are no subscription fees, no usage caps, no rate limits, and no concerns about your code being sent to external servers. Your conversations with the AI never leave your machine.
              - paragraph [ref=e126]:
                - text: "\"I use Ollama all the time on planes — it's a lot of fun!\""
                - link "Sareen noted" [ref=e127] [cursor=pointer]:
                  - /url: https://www.youtube.com/watch?v=WG10r2N0IwM
                - text: during a demonstration, highlighting how local models free developers from the constraints of internet connectivity.
              - heading "What Goose can do that traditional code assistants can't" [level=2] [ref=e128]
              - paragraph [ref=e129]:
                - link "Goose" [ref=e130] [cursor=pointer]:
                  - /url: https://block.github.io/goose/
                - text: operates as a command-line tool or desktop application that can autonomously perform complex development tasks. It can build entire projects from scratch, write and execute code, debug failures, orchestrate workflows across multiple files, and interact with external APIs — all without constant human oversight.
              - paragraph [ref=e131]:
                - text: The architecture relies on what the AI industry calls "
                - link "tool calling" [ref=e132] [cursor=pointer]:
                  - /url: https://www.ibm.com/think/topics/tool-calling
                - text: "\" or \""
                - link "function calling" [ref=e133] [cursor=pointer]:
                  - /url: https://platform.openai.com/docs/guides/function-calling?api-mode=chat
                - text: "\" — the ability for a language model to request specific actions from external systems. When you ask"
                - link "Goose" [ref=e134] [cursor=pointer]:
                  - /url: https://block.github.io/goose/
                - text: to create a new file, run a test suite, or check the status of a GitHub pull request, it doesn't just generate text describing what should happen. It actually executes those operations.
              - paragraph [ref=e135]:
                - text: This capability depends heavily on the underlying language model.
                - link "Claude 4 models" [ref=e136] [cursor=pointer]:
                  - /url: https://platform.claude.com/docs/en/about-claude/models/overview
                - text: from Anthropic currently perform best at tool calling, according to the
                - link "Berkeley Function-Calling Leaderboard" [ref=e137] [cursor=pointer]:
                  - /url: https://gorilla.cs.berkeley.edu/leaderboard.html
                - text: ", which ranks models on their ability to translate natural language requests into executable code and system commands."
              - paragraph [ref=e138]:
                - text: "But newer open-source models are catching up quickly. Goose's documentation highlights several options with strong tool-calling support: Meta's"
                - link "Llama series" [ref=e139] [cursor=pointer]:
                  - /url: https://www.llama.com/
                - text: ", Alibaba's"
                - link "Qwen models" [ref=e140] [cursor=pointer]:
                  - /url: https://qwen.ai/home
                - text: ", Google's"
                - link "Gemma variants" [ref=e141] [cursor=pointer]:
                  - /url: https://deepmind.google/models/gemma/
                - text: ", and DeepSeek's"
                - link "reasoning-focused architectures" [ref=e142] [cursor=pointer]:
                  - /url: https://huggingface.co/deepseek-ai/DeepSeek-R1
                - text: .
              - paragraph [ref=e143]:
                - text: The tool also integrates with the
                - link "Model Context Protocol" [ref=e144] [cursor=pointer]:
                  - /url: https://modelcontextprotocol.io/docs/getting-started/intro
                - text: ", or MCP, an emerging standard for connecting AI agents to external services. Through MCP, Goose can access databases, search engines, file systems, and third-party APIs — extending its capabilities far beyond what the base language model provides."
              - heading "Setting Up Goose with a Local Model" [level=2] [ref=e145]
              - paragraph [ref=e146]:
                - text: "For developers interested in a completely free, privacy-preserving setup, the process involves three main components:"
                - link "Goose" [ref=e147] [cursor=pointer]:
                  - /url: https://block.github.io/goose/
                - text: itself,
                - link "Ollama" [ref=e148] [cursor=pointer]:
                  - /url: https://ollama.com/
                - text: (a tool for running open-source models locally), and a compatible language model.
              - paragraph [ref=e149]: "Step 1: Install Ollama"
              - paragraph [ref=e150]:
                - link "Ollama" [ref=e151] [cursor=pointer]:
                  - /url: https://ollama.com/
                - text: is an open-source project that dramatically simplifies the process of running large language models on personal hardware. It handles the complex work of downloading, optimizing, and serving models through a simple interface.
              - paragraph [ref=e152]:
                - text: Download and install Ollama from
                - link "ollama.com" [ref=e153] [cursor=pointer]:
                  - /url: http://ollama.com
                - text: . Once installed, you can pull models with a single command. For coding tasks,
                - link "Qwen 2.5" [ref=e154] [cursor=pointer]:
                  - /url: https://qwen.ai/blog?id=qwen2.5-max
                - text: "offers strong tool-calling support:"
              - paragraph [ref=e155]: ollama run qwen2.5
              - paragraph [ref=e156]: The model downloads automatically and begins running on your machine.
              - paragraph [ref=e157]: "Step 2: Install Goose"
              - paragraph [ref=e158]:
                - link "Goose" [ref=e159] [cursor=pointer]:
                  - /url: https://block.github.io/goose/
                - text: is available as both a desktop application and a command-line interface. The desktop version provides a more visual experience, while the CLI appeals to developers who prefer working entirely in the terminal.
              - paragraph [ref=e160]:
                - text: Installation instructions vary by operating system but generally involve downloading from Goose's
                - link "GitHub releases page" [ref=e161] [cursor=pointer]:
                  - /url: https://github.com/block/goose
                - text: or using a package manager. Block provides pre-built binaries for macOS (both Intel and Apple Silicon), Windows, and Linux.
              - paragraph [ref=e162]: "Step 3: Configure the Connection"
              - paragraph [ref=e163]: In Goose Desktop, navigate to Settings, then Configure Provider, and select Ollama. Confirm that the API Host is set to http://localhost:11434 (Ollama's default port) and click Submit.
              - paragraph [ref=e164]: For the command-line version, run goose configure, select "Configure Providers," choose Ollama, and enter the model name when prompted.
              - paragraph [ref=e165]: That's it. Goose is now connected to a language model running entirely on your hardware, ready to execute complex coding tasks without any subscription fees or external dependencies.
              - heading "The RAM, processing power, and trade-offs you should know about" [level=2] [ref=e166]
              - paragraph [ref=e167]: "The obvious question: what kind of computer do you need?"
              - paragraph [ref=e168]: Running large language models locally requires substantially more computational resources than typical software. The key constraint is memory — specifically, RAM on most systems, or VRAM if using a dedicated graphics card for acceleration.
              - paragraph [ref=e169]:
                - text: Block's
                - link "documentation" [ref=e170] [cursor=pointer]:
                  - /url: https://block.github.io/goose/docs/category/guides
                - text: suggests that 32 gigabytes of RAM provides "a solid baseline for larger models and outputs." For Mac users, this means the computer's unified memory is the primary bottleneck. For Windows and Linux users with discrete NVIDIA graphics cards, GPU memory (VRAM) matters more for acceleration.
              - paragraph [ref=e171]:
                - text: But you don't necessarily need expensive hardware to get started. Smaller models with fewer parameters run on much more modest systems.
                - link "Qwen 2.5" [ref=e172] [cursor=pointer]:
                  - /url: https://qwen.ai/blog?id=qwen2.5-max
                - text: ", for instance, comes in multiple sizes, and the smaller variants can operate effectively on machines with 16 gigabytes of RAM."
              - paragraph [ref=e173]:
                - text: "\"You don't need to run the largest models to get excellent results,\""
                - link "Sareen emphasized" [ref=e174] [cursor=pointer]:
                  - /url: https://www.youtube.com/watch?v=WG10r2N0IwM
                - text: ". The practical recommendation: start with a smaller model to test your workflow, then scale up as needed."
              - paragraph [ref=e175]:
                - text: For context, Apple's entry-level
                - link "MacBook Air" [ref=e176] [cursor=pointer]:
                  - /url: https://www.apple.com/macbook-air/
                - text: with 8 gigabytes of RAM would struggle with most capable coding models. But a
                - link "MacBook Pro" [ref=e177] [cursor=pointer]:
                  - /url: https://www.apple.com/macbook-pro/
                - text: with 32 gigabytes — increasingly common among professional developers — handles them comfortably.
              - heading "Why keeping your code off the cloud matters more than ever" [level=2] [ref=e178]
              - paragraph [ref=e179]:
                - link "Goose" [ref=e180] [cursor=pointer]:
                  - /url: https://block.github.io/goose/
                - text: with a local LLM is not a perfect substitute for
                - link "Claude Code" [ref=e181] [cursor=pointer]:
                  - /url: https://claude.com/product/claude-code
                - text: . The comparison involves real trade-offs that developers should understand.
              - paragraph [ref=e182]:
                - text: "Model Quality:"
                - link "Claude 4.5 Opus" [ref=e183] [cursor=pointer]:
                  - /url: https://www.anthropic.com/news/claude-opus-4-5
                - text: ", Anthropic's flagship model, remains arguably the most capable AI for software engineering tasks. It excels at understanding complex codebases, following nuanced instructions, and producing high-quality code on the first attempt. Open-source models have improved dramatically, but a gap persists — particularly for the most challenging tasks."
              - paragraph [ref=e184]:
                - text: One developer who switched to the $200 Claude Code plan
                - link "described the difference bluntly" [ref=e185] [cursor=pointer]:
                  - /url: https://userjot.com/blog/claude-code-pricing-200-dollar-plan-worth-it
                - text: ": \"When I say 'make this look modern,' Opus knows what I mean. Other models give me Bootstrap circa 2015.\""
              - paragraph [ref=e186]:
                - text: "Context Window:"
                - link "Claude Sonnet 4.5" [ref=e187] [cursor=pointer]:
                  - /url: https://www.anthropic.com/news/claude-sonnet-4-5
                - text: ", accessible through the API, offers a massive one-million-token context window — enough to load entire large codebases without chunking or context management issues. Most local models are limited to 4,096 or 8,192 tokens by default, though many can be configured for longer contexts at the cost of increased memory usage and slower processing."
              - paragraph [ref=e188]:
                - text: "Speed: Cloud-based services like"
                - link "Claude Code" [ref=e189] [cursor=pointer]:
                  - /url: https://claude.com/product/claude-code
                - text: run on dedicated server hardware optimized for AI inference. Local models, running on consumer laptops, typically process requests more slowly. The difference matters for iterative workflows where you're making rapid changes and waiting for AI feedback.
              - paragraph [ref=e190]:
                - text: "Tooling Maturity:"
                - link "Claude Code" [ref=e191] [cursor=pointer]:
                  - /url: https://claude.com/product/claude-code
                - text: benefits from Anthropic's dedicated engineering resources. Features like prompt caching (which can reduce costs by up to 90 percent for repeated contexts) and structured outputs are polished and well-documented.
                - link "Goose" [ref=e192] [cursor=pointer]:
                  - /url: https://block.github.io/goose/
                - text: ", while actively developed with 102 releases to date, relies on community contributions and may lack equivalent refinement in specific areas."
              - heading "How Goose stacks up against Cursor, GitHub Copilot, and the paid AI coding market" [level=2] [ref=e193]
              - paragraph [ref=e194]: Goose enters a crowded market of AI coding tools, but occupies a distinctive position.
              - paragraph [ref=e195]:
                - link "Cursor" [ref=e196] [cursor=pointer]:
                  - /url: https://cursor.com/
                - text: ", a popular AI-enhanced code editor, charges $20 per month for its"
                - link "Pro tier" [ref=e197] [cursor=pointer]:
                  - /url: https://cursor.com/pricing
                - text: and $200 for
                - link "Ultra" [ref=e198] [cursor=pointer]:
                  - /url: https://cursor.com/pricing
                - text: —pricing that mirrors
                - link "Claude Code's Max plans" [ref=e199] [cursor=pointer]:
                  - /url: https://claude.com/pricing
                - text: . Cursor provides approximately 4,500 Sonnet 4 requests per month at the Ultra level, a substantially different allocation model than Claude Code's hourly resets.
              - paragraph [ref=e200]:
                - link "Cline" [ref=e201] [cursor=pointer]:
                  - /url: https://cline.bot/
                - text: ","
                - link "Roo Code" [ref=e202] [cursor=pointer]:
                  - /url: https://roocode.com/
                - text: ", and similar open-source projects offer AI coding assistance but with varying levels of autonomy and tool integration. Many focus on code completion rather than the agentic task execution that defines Goose and Claude Code."
              - paragraph [ref=e203]:
                - text: Amazon's
                - link "CodeWhisperer" [ref=e204] [cursor=pointer]:
                  - /url: https://aws.amazon.com/blogs/aws/now-in-preview-amazon-codewhisperer-ml-powered-coding-companion/
                - text: ","
                - link "GitHub Copilot" [ref=e205] [cursor=pointer]:
                  - /url: https://github.com/features/copilot
                - text: ", and enterprise offerings from major cloud providers target large organizations with complex procurement processes and dedicated budgets. They are less relevant to individual developers and small teams seeking lightweight, flexible tools."
              - paragraph [ref=e206]: Goose's combination of genuine autonomy, model agnosticism, local operation, and zero cost creates a unique value proposition. The tool is not trying to compete with commercial offerings on polish or model quality. It's competing on freedom — both financial and architectural.
              - heading "The $200-a-month era for AI coding tools may be ending" [level=2] [ref=e207]
              - paragraph [ref=e208]:
                - text: The AI coding tools market is evolving quickly. Open-source models are improving at a pace that continually narrows the gap with proprietary alternatives. Moonshot AI's
                - link "Kimi K2" [ref=e209] [cursor=pointer]:
                  - /url: https://www.kimi.com/en
                - text: and z.ai's
                - link "GLM 4.5" [ref=e210] [cursor=pointer]:
                  - /url: https://z.ai/blog/glm-4.5
                - text: now benchmark near
                - link "Claude Sonnet 4 levels" [ref=e211] [cursor=pointer]:
                  - /url: https://www.anthropic.com/news/claude-4
                - text: — and they're freely available.
              - paragraph [ref=e212]: If this trajectory continues, the quality advantage that justifies Claude Code's premium pricing may erode. Anthropic would then face pressure to compete on features, user experience, and integration rather than raw model capability.
              - paragraph [ref=e213]:
                - text: For now, developers face a clear choice. Those who need the absolute best model quality, who can afford premium pricing, and who accept usage restrictions may prefer
                - link "Claude Code" [ref=e214] [cursor=pointer]:
                  - /url: https://claude.com/product/claude-code
                - text: . Those who prioritize cost, privacy, offline access, and flexibility have a genuine alternative in
                - link "Goose" [ref=e215] [cursor=pointer]:
                  - /url: https://block.github.io/goose/
                - text: .
              - paragraph [ref=e216]: The fact that a $200-per-month commercial product has a zero-dollar open-source competitor with comparable core functionality is itself remarkable. It reflects both the maturation of open-source AI infrastructure and the appetite among developers for tools that respect their autonomy.
              - paragraph [ref=e217]: Goose is not perfect. It requires more technical setup than commercial alternatives. It depends on hardware resources that not every developer possesses. Its model options, while improving rapidly, still trail the best proprietary offerings on complex tasks.
              - paragraph [ref=e218]: "But for a growing community of developers, those limitations are acceptable trade-offs for something increasingly rare in the AI landscape: a tool that truly belongs to them."
              - separator [ref=e219]
              - paragraph [ref=e220]:
                - text: Goose is available for download at
                - link "github.com/block/goose" [ref=e221] [cursor=pointer]:
                  - /url: http://github.com/block/goose
                - text: . Ollama is available at
                - link "ollama.com" [ref=e222] [cursor=pointer]:
                  - /url: http://ollama.com
                - text: . Both projects are free and open source.
