    - generic [ref=e15]:
      - paragraph [ref=e16]:
        - generic [ref=e17]: 上个月钉钉发布悟空的时候，我就写过 ATH。3 月 16 日阿里把分散的 AI 兵力重新编队，成立了一个新组织，叫 Alibaba Token Hub，简称 ATH。这个名字很有趣，不谈别的，先谈 Token。吴泳铭在内部会议里给出的战略也很清晰：创造 Token，交付 Token，应用 Token。看起来像一次组织调整，但从 AI 技术和产品的角度看，我想，这是阿里对 AI 时代生产关系的一次重构。
      - paragraph [ref=e18]:
        - generic [ref=e19]: "1"
      - paragraph [ref=e20]:
        - generic [ref=e21]: 两周后，ATH 就有了大动静。3 月 30 日，千问发布全模态模型 Qwen 3.5-Omni；4 月 1 日，阿里推出图像生成与编辑模型 Wan 2.7-Image；4 月 2 日，千问再发 Qwen 3.6-Plus，周末在家看了一下 Qwen 3.6-Plus 的特性和 CodeArena 榜单，感觉阿里这次真是把火力都集中到当下最关键、也最能体现真实生产力的赛道上了：Coding Agent。
      - paragraph [ref=e22]:
        - generic [ref=e23]: CodeArena 榜单上，Qwen 3.6-Plus 已经重回国内第一：
      - img "Image" [ref=e25]
      - paragraph [ref=e26]:
        - generic [ref=e27]: 三天三连发，节奏非常紧凑，阿里 AI 的速度感回来了。
      - paragraph [ref=e28]:
        - generic [ref=e29]: "2"
      - paragraph [ref=e30]:
        - generic [ref=e31]: 这次 Qwen 3.6-Plus 是我最感兴趣的模型，之前国内大厂比较重注的是模型的综合能力和视觉能力，阿里好像也是如此，不过这次 Qwen 3.6-Plus 终于把提升重点落在了编程和 Agent 能力上，包括工具调用、多模态理解和长上下文上，1M 上下文窗口，同时，Qwen 3.6-Plus 还非常贴心地面向 OpenClaw、Qwen Code、Claude Code、Cline 等 Agent 框架做了优化，这个目标就非常明确了：把千问的模型直接推到实际的 Agent 环境里干活。
      - paragraph [ref=e32]:
        - generic [ref=e33]: 为什么 Coding 模型这么重要？我在今年年初就写过了，2025 年所有厂商都发现，大模型最擅长的就是 Coding 和 Agent 这两件事，加一块，就形成了巨大的商业模式。并且，一个 Agent 真正跑起来，它的作用和消耗的 Token 都不是线性增长，而是成百倍地放大。
      - paragraph [ref=e34]:
        - generic [ref=e35]: Agent 要读文档、调工具、写代码、跑测试、反复修订，还要在长长的链路里保持稳定。这里的 Token 不再只是模型的计量单位，大家笑称，Token 就是 AI 时代真正的“燃料”啊。
      - paragraph [ref=e36]:
        - generic [ref=e37]: "3"
      - paragraph [ref=e38]:
        - generic [ref=e39]: ATH 这个名字看起来有些工程味道，恰恰说明阿里已经把这事儿想清楚了：AI 竞争，最终拼的是一整条 Token 产业链：平头哥、阿里云和ATH的组合把算力层、模型层、应用层更深度地绑在了一起，上游是以阿里云和平头哥为核心的计算、存储、网络等训练推理资源，中游是千问这样的基础模型和 百炼MaaS 平台，下游则是千问 App、悟空、Qoder 这类能直接触达开发者和企业用户的应用。
      - paragraph [ref=e40]:
        - generic [ref=e41]: 现在很多 AI 公司的问题都是，实验室不错，C 端产品也热闹，但中间的协同差点事，ATH 要填平的正是这个鸿沟。从这个角度看，Qwen 3.6-Plus 发布的时间点，就是 ATH 成立后的第一张答卷，还挺好，直接冲到了 Coding 榜单国产第一名。
      - paragraph [ref=e42]:
        - generic [ref=e43]: Agent 时代最稀缺的，正是这种能执行、能编排、能在真实环境里完成复杂任务的模型。
      - paragraph [ref=e44]:
        - generic [ref=e45]: 我觉得吧，咱们国家和海外顶级模型还差的那一点，就在这个领域。所以我特别希望国内模型在 Coding 领域能霸榜，我也愿意付费订阅国产模型的 Coding Plan，希望他们越来越好，帮我干更多活，我就越开心。
      - paragraph [ref=e46]:
        - generic [ref=e47]: "4"
      - paragraph [ref=e48]:
        - generic [ref=e49]: Qwen 3.6-Plus 在 SWE-bench、Terminal-Bench 2.0、NL2Repo、Claw-Eval 等编程和 Agent 测试上表现都突出，在仓库级任务、终端操作、自动化执行这些更接近真实工作的场景里，显露出了很强的工程能力。
      - paragraph [ref=e50]:
        - generic [ref=e51]: 更有意思的是，市场对这种能力的反馈，不止在模型榜单上，而是体现在真实调用平台上。类似 OpenRouter 这类平台，本质上就是 AI 世界的公开市场。谁被调用，谁被复用，谁被开发者持续放进工作流里，那里会很快给出答案。
      - paragraph [ref=e52]:
        - generic [ref=e53]: Qwen3.6-Plus 上线没几天已经冲到 OpenRouter 周榜第二，同时在 OpenRouter 的趋势榜单里包揽了前二的位置：
      - img "Image" [ref=e55]
      - paragraph [ref=e56]:
        - generic [ref=e57]: 这意味着，开发者已经开始用脚投票了。榜单会一直波动，但这种“上线即高频被用”的现象，本身就比静态评测更说明问题。
      - paragraph [ref=e58]:
        - generic [ref=e59]: "5"
      - paragraph [ref=e60]:
        - generic [ref=e61]: 阿里最近这波动作，更像是一次从实验室走向产业化的连续推进。ATH 设立之后，阿里很快推出原生 Agent 产品悟空，能够触达钉钉 2000 万存量企业用户。换句话说，阿里并没有满足于把能力停留在模型 API 层，而是把它塞进企业工作流里，变成真正能落地的生产工具。
      - paragraph [ref=e62]:
        - generic [ref=e63]: 另一个信号是，阿里云上个月宣布上调部分 AI 算力和存储产品价格，涨幅最高达到 34%。在一个价格战打了很多年的云市场里，涨价从来都不是一件轻松的事。它至少说明两件事：
      - paragraph [ref=e64]:
        - generic [ref=e65]: 第一，需求在爆炸性增长；
      - paragraph [ref=e66]:
        - generic [ref=e67]: 第二，市场愿意为 AI 生产力买单。
      - paragraph [ref=e68]:
        - generic [ref=e69]: 这次调价发生在 AI 需求和供应链成本同步走高的背景下，也就是说，阿里云已经不只是“卖资源”了，它开始站到另一个位置：卖 AI 能力，卖进入 Agent 时代的门票。阿里正在把 AI 的供给能力、分发能力和消费能力重新接到一起。这个逻辑其实和电商时代有点像：阿里擅长做平台，也擅长做基础设施。到了 AI 时代，它仍然在做同一件事，只不过流动的货物，从商品变成了 Token。
      - paragraph [ref=e70]:
        - generic [ref=e71]: 很多人这两年谈国产 AI，容易陷入一种简单叙事：谁更像 OpenAI，谁更像 Anthropic。阿里这条路，恰恰谁都不像，它在基于自己的资源和生态做全链路整合。有云，有芯片，有企业服务，有消费级入口，有足够多的真实业务场景，一旦 Agent 真的开始大规模落地，它的威力就会逐步显示出来。
      - paragraph [ref=e72]:
        - generic [ref=e73]: "6"
      - paragraph [ref=e74]:
        - generic [ref=e75]: Qwen 3.6-Plus 的这次发布，让我真正看到阿里开始在 Coding Agent 这条赛道上发力：把算力、模型、工具链和真实开发场景，一层层都给到代码和 Agent 的生产力上。你想想，模型专门适配 OpenClaw、Qwen Code、Claude Code……这个目的已经非常明确了。
      - paragraph [ref=e76]:
        - generic [ref=e77]: 如果把这一轮 AI 竞争看成一场超长的马拉松，Qwen 3.6-Plus 就是千问在 Coding Agent 方向上的一次有意识提速，ATH 则在赛道旁边稳稳的保驾护航。
      - paragraph [ref=e78]:
        - generic [ref=e79]: 创造 Token，交付 Token，应用 Token。这是个燃烧 Token 的时代。
