# ── 开发类信号源（需要脚本支持）──────────────────────
# 以下信号源无法通过 RSS 直接获取，需要开发专用脚本
# 脚本统一放在 scripts/ 目录下，通过 npm run 调用

dev_sources:
  # GitHub Trending — 每日最热开源项目，工具爆发早信号
  - name: GitHub Trending (Python)
    url: https://github.com/trending/python?since=daily
    method: scrape
    frequency: daily
    script: scripts/fetch-github-trending.js  # TODO: 待开发

# OpenRouter 模型监控 — API 轮询新模型上线
  - name: OpenRouter New Models
    url: https://openrouter.ai/api/v1/models
    method: api-poll
    frequency: daily
    script: scripts/fetch-openrouter-models.js  # TODO: 待开发

  # PyPI 下载趋势 — 判断哪些 AI 库真正被用起来
  - name: PyPI AI Package Trends
    url: https://pypistats.org/api/
    method: api-poll
    frequency: weekly
    script: scripts/fetch-pypi-trends.js  # TODO: 待开发
    packages:
      - transformers
      - langchain
      - openai
      - anthropic
      - vllm
      - llama-cpp-python
      - ollama
      - crewai
      - autogen
      - dspy-ai
