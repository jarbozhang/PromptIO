# PromptIO — AI 领域英文信息源
# 定位：英文→中文信息差，专做国内媒体未覆盖的一手信息

# ── RSS 源（pipeline.js 自动抓取）──────────────────────

sources:
  # 科技媒体
  - name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    language: en

  - name: VentureBeat AI
    url: https://venturebeat.com/category/ai/feed/
    language: en

  - name: The Verge AI
    url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    language: en

  - name: ArsTechnica AI
    url: https://feeds.arstechnica.com/arstechnica/technology-lab
    language: en

  - name: MIT Technology Review AI
    url: https://www.technologyreview.com/topic/artificial-intelligence/feed
    language: en

  # AI 公司官方博客
  - name: OpenAI Blog
    url: https://openai.com/blog/rss.xml
    language: en

  - name: Google AI Blog
    url: https://blog.google/technology/ai/rss/
    language: en

  - name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    language: en

  - name: DeepMind Blog
    url: https://deepmind.google/blog/rss.xml
    language: en

  - name: Meta AI Blog
    url: https://ai.meta.com/blog/rss/
    language: en

  # 开发者社区
  - name: Hacker News (Algolia AI filter)
    url: https://hnrss.org/newest?q=AI+OR+LLM+OR+GPT+OR+Claude+OR+Gemini&points=50
    language: en

  - name: Lobsters AI
    url: https://lobste.rs/t/ai,ml.rss
    language: en

  - name: Reddit r/LocalLLaMA
    url: https://www.reddit.com/r/LocalLLaMA/top/.rss?t=day
    language: en

  - name: Reddit r/MachineLearning
    url: https://www.reddit.com/r/MachineLearning/top/.rss?t=day
    language: en

  # 个人技术博客（高质量实操内容）
  - name: Simon Willison
    url: https://simonwillison.net/atom/everything/
    language: en

  - name: Sebastian Raschka
    url: https://magazine.sebastianraschka.com/feed
    language: en

  # Newsletter
  - name: TLDR AI
    url: https://tldr.tech/ai/rss
    language: en

